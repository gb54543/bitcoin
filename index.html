<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Crypto Analyzer</title>

  <link rel="stylesheet" href="style.css">
  <script src="https://s3.tradingview.com/tv.js"></script>
</head>

<body>

<div class="container">

  <h1>📊 Crypto Analyzer</h1>

  <!-- MOEDAS -->
  <div class="card moedas">
    <button class="moeda active" data-moeda="bitcoin">BTC</button>
    <button class="moeda" data-moeda="ethereum">ETH</button>
    <button class="moeda" data-moeda="solana">SOL</button>
    <button class="moeda" data-moeda="ripple">XRP</button>
    <button class="moeda" data-moeda="cardano">ADA</button>
  </div>

  <!-- INFO -->
  <div class="row">

    <div class="card pequeno">
      <p>💰 Preço</p>
      <strong id="preco">--</strong>
    </div>

    <div class="card pequeno">
      <p>⏱ Timer</p>
      <strong id="timer">00:00</strong>
    </div>

  </div>

  <!-- GRÁFICO -->
  <div class="card">
    <div id="chart"></div>
  </div>

  <!-- ANALISE -->
  <div class="card">
    <div id="sinalBox" class="sinal-box">...</div>

    <div class="stats">
      <div>Tendência: <span id="tendencia">-</span></div>
      <div>Força: <span id="forca">-</span></div>
      <div>Momentum: <span id="momentum">-</span></div>
      <div>Volatilidade: <span id="volatilidade">-</span></div>
    </div>
  </div>

</div>

<script src="script.js"></script>
</body>
</html>
