<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Analyzer Pro</title>

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- CSS -->
  <link rel="stylesheet" href="style.css">

  <!-- TradingView -->
  <script src="https://s3.tradingview.com/tv.js"></script>
</head>

<body>

<div class="container">

  <h1>Analyzer Pro</h1>

  <!-- MOEDAS -->
  <div class="moedas">
    <button class="moeda active" data-moeda="bitcoin">BTC</button>
    <button class="moeda" data-moeda="ethereum">ETH</button>
    <button class="moeda" data-moeda="solana">SOL</button>
    <button class="moeda" data-moeda="ripple">XRP</button>
    <button class="moeda" data-moeda="cardano">ADA</button>
    <button class="moeda" data-moeda="dogecoin">DOGE</button>
  </div>

  <!-- INFO -->
  <div class="info">
    <div class="box">
      <span>Preço</span>
      <strong id="preco">--</strong>
    </div>

    <div class="box">
      <span>Tempo</span>
      <strong id="timer">--</strong>
    </div>

    <div class="box">
      <span>Status</span>
      <strong id="status">--</strong>
    </div>
  </div>

  <!-- GRÁFICO -->
  <div id="chart"></div>

  <!-- ANALISE -->
  <div class="analise">

    <div id="sinal">CARREGANDO...</div>

    <div class="grid">
      <div><span>Tendência</span><strong id="tendencia">-</strong></div>
      <div><span>Força</span><strong id="forca">-</strong></div>
      <div><span>RSI</span><strong id="rsi">-</strong></div>
      <div><span>Momentum</span><strong id="momentum">-</strong></div>
      <div><span>Volatilidade</span><strong id="vol">-</strong></div>
      <div><span>Score</span><strong id="score">-</strong></div>
    </div>

  </div>

</div>

<script src="script.js"></script>
</body>
</html>
