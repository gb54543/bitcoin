<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Trader AI</title>

<script src="https://unpkg.com/lightweight-charts/dist/lightweight-charts.standalone.production.js"></script>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0f0f0f;
  color: white;
}

.container {
  max-width: 1000px;
  margin: auto;
  padding: 15px;
}

.topo {
  display: flex;
  justify-content: space-between;
  align-items: center;
}

select {
  padding: 6px;
  border-radius: 6px;
  border: none;
  background: #1a1a1a;
  color: white;
}

#grafico {
  height: 350px;
  margin-top: 10px;
}

.box {
  background: #1a1a1a;
  padding: 12px;
  border-radius: 10px;
  margin-top: 10px;
}

.btn {
  width: 100%;
  padding: 10px;
  background: #6c5cff;
  border: none;
  border-radius: 8px;
  color: white;
  margin-top: 10px;
  cursor: pointer;
  font-weight: bold;
}

.grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
}

.item {
  background: #141414;
  padding: 8px;
  border-radius: 8px;
  font-size: 14px;
}
</style>
</head>

<body>

<div class="container">

<div class="topo">
<h2>Trader AI</h2>

<select onchange="trocarMoeda(this.value)">
<option value="BTCUSDT">BTC</option>
<option value="ETHUSDT">ETH</option>
<option value="SOLUSDT">SOL</option>
<option value="BNBUSDT">BNB</option>
<option value="XRPUSDT">XRP</option>
</select>
</div>

<div id="grafico"></div>

<div class="box">
<button class="btn" onclick="analiseInteligente()">Análise Inteligente</button>
</div>

<div class="box grid">
<div class="item">Tendência: <span id="tendencia">-</span></div>
<div class="item">Força: <span id="forca">-</span></div>
<div class="item">Momentum: <span id="momentum">-</span></div>
<div class="item">Volatilidade: <span id="vol">-</span></div>
<div class="item">Prob. Alta: <span id="probAlta">-</span></div>
<div class="item">Prob. Baixa: <span id="probBaixa">-</span></div>
<div class="item">Zona Compra: <span id="buyZone">-</span></div>
<div class="item">Zona Venda: <span id="sellZone">-</span></div>
<div class="item">Sinal: <span id="sinal">-</span></div>
</div>

<div class="box">
<div id="leitura">Clique em análise inteligente...</div>
</div>

</div>

<script>

// ======================
// CONFIG
// ======================

let moeda = "BTCUSDT";

// ======================
// GRAFICO PROFISSIONAL
// ======================

const chart = LightweightCharts.createChart(document.getElementById('grafico'), {
  height: 350,
  layout: {
    background: { color: '#0f0f0f' },
    textColor: '#fff'
  },
  grid: {
    vertLines: { color: '#1f1f1f' },
    horzLines: { color: '#1f1f1f' }
  }
});

const candles = chart.addCandlestickSeries();

// ======================
// CARREGAR VELAS
// ======================

async function carregar() {
  const res = await fetch(`https://api.binance.com/api/v3/klines?symbol=${moeda}&interval=1m&limit=100`);
  const data = await res.json();

  const formatado = data.map(v => ({
    time: v[0] / 1000,
    open: +v[1],
    high: +v[2],
    low: +v[3],
    close: +v[4]
  }));

  candles.setData(formatado);
}

carregar();

// ======================
// ATUALIZAÇÃO TEMPO REAL
// ======================

setInterval(async () => {
  const res = await fetch(`https://api.binance.com/api/v3/klines?symbol=${moeda}&interval=1m&limit=2`);
  const data = await res.json();

  const v = data[data.length - 1];

  candles.update({
    time: v[0] / 1000,
    open: +v[1],
    high: +v[2],
    low: +v[3],
    close: +v[4]
  });

}, 2000);

// ======================
// TROCAR MOEDA
// ======================

function trocarMoeda(m) {
  moeda = m;
  carregar();
}

// ======================
// ANALISE BASICA
// ======================

function calc(arr){
  return arr.reduce((a,b)=>a+b,0)/arr.length;
}

let historico = [];

setInterval(async () => {
  const res = await fetch(`https://api.binance.com/api/v3/ticker/price?symbol=${moeda}`);
  const data = await res.json();

  let preco = +data.price;

  historico.push(preco);
  if(historico.length > 50) historico.shift();

  if(historico.length < 10) return;

  let curta = calc(historico.slice(-5));
  let longa = calc(historico);

  let tendencia = curta > longa ? "ALTA" : "BAIXA";
  let forca = ((curta-longa)/longa)*100;
  let momentum = preco > historico[historico.length-2] ? "SUBINDO" : "CAINDO";

  let max = Math.max(...historico);
  let min = Math.min(...historico);
  let vol = ((max-min)/min)*100;

  document.getElementById("tendencia").innerText = tendencia;
  document.getElementById("forca").innerText = forca.toFixed(2)+"%";
  document.getElementById("momentum").innerText = momentum;
  document.getElementById("vol").innerText = vol.toFixed(2)+"%";

},1000);

// ======================
// ANALISE INTELIGENTE
// ======================

function analiseInteligente(){

  if(historico.length < 20){
    alert("Carregando dados...");
    return;
  }

  let preco = historico[historico.length-1];

  let max = Math.max(...historico);
  let min = Math.min(...historico);

  let suporte = min * 1.01;
  let resistencia = max * 0.99;

  let direcao = preco > historico[historico.length-5] ? "ALTA" : "BAIXA";

  let probAlta = direcao === "ALTA" ? 72 : 28;
  let probBaixa = 100 - probAlta;

  document.getElementById("probAlta").innerText = probAlta+"%";
  document.getElementById("probBaixa").innerText = probBaixa+"%";
  document.getElementById("buyZone").innerText = suporte.toFixed(2);
  document.getElementById("sellZone").innerText = resistencia.toFixed(2);
  document.getElementById("sinal").innerText = direcao === "ALTA" ? "COMPRA" : "VENDA";

  document.getElementById("leitura").innerText =
  `Mercado em ${direcao}.
Preço atual: ${preco.toFixed(2)}.

Zona forte de compra próxima de ${suporte.toFixed(2)}.
Zona de venda próxima de ${resistencia.toFixed(2)}.

Maior probabilidade de ${direcao === "ALTA" ? "continuação de alta" : "queda"} no curto prazo.`;
}

</script>

</body>
</html>
