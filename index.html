<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Crypto Analyzer PRO+</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header>
    <h1>🚀 Crypto Analyzer PRO+</h1>
  </header>

  <section class="card">
    <h2>💱 Escolha a moeda</h2>
    <select id="moeda">
      <option value="bitcoin">Bitcoin (BTC)</option>
      <option value="ethereum">Ethereum (ETH)</option>
      <option value="solana">Solana (SOL)</option>
      <option value="ripple">XRP</option>
      <option value="cardano">Cardano (ADA)</option>
    </select>
  </section>

  <section class="card">
    <h2>💰 Preço Atual</h2>
    <p id="preco">Carregando...</p>
  </section>

  <section class="card">
    <h2>📊 Gráfico</h2>
    <div id="chart"></div>
  </section>

  <section class="card sinal">
    <h2>📈 Sinal Inteligente</h2>
    <p id="sinal">Analisando...</p>
  </section>

  <script src="https://s3.tradingview.com/tv.js"></script>
  <script src="script.js"></script>

</body>
</html>
